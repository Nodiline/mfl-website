<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Football League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-home-opacity: 0.1; --bg:#0c0c0c; --surface:rgba(19,19,19,0.75); --surface2:rgba(26,26,26,0.85); --border:#252525; --text:#efefef; --muted:#a3a3a3; --accent:#4ade80; --accent-dim:#166534; --nav-bg:rgba(10,10,10,0.8); }
        html.light { --bg-home-opacity: 0.07; --bg:#f4f4f3; --surface:rgba(255,255,255,0.8); --surface2:rgba(234,234,232,0.9); --border:#d8d8d4; --text:#111; --muted:#555; --accent:#16a34a; --accent-dim:#bbf7d0; --nav-bg:rgba(244,244,243,0.8); }
        *{box-sizing:border-box;margin:0;padding:0;} html{scroll-behavior:smooth;}
        body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}
        nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
        .nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:82px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
        .nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
        .nav-brand .logo-wrap{width:40px;height:40px;}
        .nav-brand-name{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text);}
        .nav-links{display:flex;gap:2px;list-style:none;}
        .nav-links a{display:block;padding:12px 18px;color:var(--muted);text-decoration:none;font-size:18px;font-weight:500;border-radius:7px;transition:color .15s,background .15s;}
        .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2);backdrop-filter:blur(4px);}
        .theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:color .15s,background .15s;flex-shrink:0;}
        .theme-btn:hover{color:var(--text);background:var(--border);}

        .page {display:none;opacity:0;transform:translateY(10px);}
        .page.active {display:block;animation:pageIn .38s cubic-bezier(.22,.61,.36,1) forwards;}
        .page.leaving {display:block;animation:pageOut .22s cubic-bezier(.4,0,1,1) forwards;}
        @keyframes pageIn {from {opacity:0;transform:translateY(10px);} to {opacity:1;transform:translateY(0);}}
        @keyframes pageOut {from {opacity:1;transform:translateY(0);} to {opacity:0;transform:translateY(-6px);}}

        #page-home.active,#page-home.leaving{max-width:1248px;margin:24px auto;background:var(--bg);border-radius:16px;border:1px solid var(--border);padding-bottom:40px;overflow:hidden;}
        .team-logo{display:inline-flex;align-items:center;justify-content:center;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface2);font-weight:800;color:#fff;}
        .team-logo img{width:100%;height:100%;object-fit:contain;}
        .data-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
        .data-table th{padding:12px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);cursor:pointer;}
        .data-table th:hover{background:var(--surface2);}
        .data-table td{padding:12px 14px;border-bottom:1px solid var(--border);text-align:center;}
        .data-table tbody tr:hover{background:var(--surface2);}
        .data-table .player-name{color:var(--text);font-weight:600;text-align:left;}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;}
        .modal-content{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:520px;width:90%;max-height:90vh;overflow:auto;}
        .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
        .modal-body{padding:24px;}
        .modal-close{cursor:pointer;font-size:22px;}
        .player-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;background:var(--surface2);cursor:pointer;transition:all .15s;}
        .player-card:hover{background:var(--accent);color:#000;}
        .owner-badge{background:#facc15;color:#000;font-size:11px;padding:2px 8px;border-radius:9999px;font-weight:700;margin-left:auto;}
    </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-brand" onclick="navigate('home')">
      <div class="logo-wrap" id="nav-logo"></div>
      <span class="nav-brand-name">MFL</span>
    </div>
    <ul class="nav-links">
      <li><a href="#" id="nav-home" onclick="return navigate('home')" class="active">Home</a></li>
      <li><a href="#" id="nav-standings" onclick="return navigate('standings')">Standings</a></li>
      <li><a href="#" id="nav-stats" onclick="return navigate('stats')">Stats</a></li>
      <li><a href="#" id="nav-teams" onclick="return navigate('teams')">Teams</a></li>
      <li><a href="#" id="nav-schedule" onclick="return navigate('schedule')">Schedule</a></li>
      <li><a href="#" id="nav-players" onclick="return navigate('players')">Players</a></li>
      <li><a href="#" id="nav-history" onclick="return navigate('history')">League History</a></li>
    </ul>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-moon" id="theme-icon"></i></button>
  </div>
</nav>

<!-- HOME, STANDINGS, STATS, TEAMS, SCHEDULE, HISTORY pages (original content) -->
<!-- Players page added -->
<div id="page-players" class="page">
  <div class="page-hdr">
    <h1>Players</h1>
    <p>All Season 5 players. Click a name for full stats.</p>
  </div>
  <div class="stats-wrap" id="players-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:0 24px;"></div>
</div>

<!-- Modal for player details -->
<div id="player-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-name"></h2>
      <span class="modal-close" onclick="closeModal()">×</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>MFL · Minecraft Football League · Season 5</footer>

function closeModal() { document.getElementById('player-modal').style.display = 'none'; }
// ... (render functions)
renderPlayers(); // calls the new Players page
</script>
</body>
</html>
