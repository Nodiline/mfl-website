<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Football League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg:#0c0c0c; --surface:rgba(19,19,19,0.75); --surface2:rgba(26,26,26,0.85); --border:#252525;
            --text:#efefef; --muted:#a3a3a3; --accent:#4ade80;
        }
        html.light {
            --bg:#f4f4f3; --surface:rgba(255,255,255,0.8); --surface2:rgba(234,234,232,0.9); --border:#d8d8d4;
            --text:#111; --muted:#555; --accent:#16a34a;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;}
        nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
        .nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:76px;display:flex;align-items:center;justify-content:space-between;}
        .nav-brand{font-size:26px;font-weight:900;letter-spacing:-1px;cursor:pointer;}
        .nav-links{display:flex;gap:4px;list-style:none;}
        .nav-links a{padding:10px 20px;color:var(--muted);text-decoration:none;border-radius:8px;font-weight:500;transition:all .2s;}
        .nav-links a:hover,.nav-links a.active{background:var(--surface2);color:var(--text);}
        .theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        
        .page{display:none;opacity:0;transform:translateY(15px);transition:all .3s;}
        .page.active{display:block;opacity:1;transform:none;}
        
        .hero{padding:80px 24px;text-align:center;}
        .hero-title{font-size:clamp(52px,8vw,92px);font-weight:900;letter-spacing:-3px;line-height:1;}
        .hero-sub{font-size:24px;color:var(--muted);max-width:600px;margin:20px auto;}
        
        .container{max-width:1280px;margin:0 auto;padding:0 24px;}
        h1{margin-bottom:28px;font-size:42px;font-weight:800;}
        
        .data-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
        .data-table th{background:var(--surface2);padding:14px 16px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--muted);}
        .data-table td{padding:14px 16px;border-top:1px solid var(--border);}
        
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;}
        
        .admin-login-box{max-width:420px;margin:140px auto;padding:50px 40px;background:var(--surface);border:1px solid var(--border);border-radius:16px;text-align:center;}
        .admin-input{width:100%;padding:16px;margin:16px 0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;}
        
        footer{padding:40px;text-align:center;color:var(--muted);font-size:14px;border-top:1px solid var(--border);margin-top:80px;}
    </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="nav-brand" onclick="navigate('home')">MFL</div>
    <ul class="nav-links">
      <li><a href="#" id="nav-home" onclick="navigate('home')" class="active">Home</a></li>
      <li><a href="#" id="nav-standings" onclick="navigate('standings')">Standings</a></li>
      <li><a href="#" id="nav-stats" onclick="navigate('stats')">Stats</a></li>
      <li><a href="#" id="nav-teams" onclick="navigate('teams')">Teams</a></li>
      <li><a href="#" id="nav-admin" onclick="navigate('admin')">Admin</a></li>
    </ul>
    <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
  </div>
</nav>

<div id="page-home" class="page active">
  <div class="hero">
    <h1 class="hero-title">Minecraft Football League</h1>
    <p class="hero-sub">Season 5 • Official Dashboard</p>
    <button onclick="navigate('standings')" style="background:var(--accent);color:#000;font-weight:700;padding:14px 32px;border-radius:9999px;border:none;font-size:17px;cursor:pointer;margin-top:20px;">View Standings</button>
  </div>
</div>

<div id="page-standings" class="page">
  <div class="container">
    <h1>Standings</h1>
    <div id="standings-content" class="card">Standings will appear here (coming soon)</div>
  </div>
</div>

<div id="page-stats" class="page">
  <div class="container">
    <h1>Player Fantasy Points</h1>
    <table class="data-table" id="stats-table">
      <thead><tr><th>Player</th><th>FP</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="page-teams" class="page">
  <div class="container">
    <h1>Teams</h1>
    <div id="teams-content" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
  </div>
</div>

<div id="page-admin" class="page">
  <div id="admin-login" class="admin-login-box">
    <h2>Staff Login</h2>
    <input type="password" id="admin-pw" class="admin-input" placeholder="Password">
    <button onclick="checkAdminPw()" style="width:100%;padding:16px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer;">Login</button>
  </div>
  
  <div id="admin-dashboard" style="display:none;" class="container">
    <h1>Admin Dashboard</h1>
    <button onclick="saveRaw()" style="margin:20px 0;padding:12px 24px;background:var(--accent);color:#000;border:none;border-radius:8px;">Save Changes</button>
    <textarea id="raw-json" style="width:100%;height:500px;background:#111;color:#0f0;font-family:monospace;padding:16px;border:1px solid #333;border-radius:8px;"></textarea>
  </div>
</div>

<footer>Minecraft Football League • Season 5</footer>

<script>
let LEAGUE_DATA = {
  teams: [
    { name:"Dolphins", conf:"Overworld" },
    { name:"Guardians", conf:"Overworld" },
    { name:"Pigs", conf:"Overworld" }
  ],
  stats: [
    { name: "beefourr", fp: 495.0 },
    { name: "Prodxgy", fp: 383.8 },
    { name: "nood", fp: 347.8 }
  ]
};

if (localStorage.getItem('MFL_DB')) {
  LEAGUE_DATA = JSON.parse(localStorage.getItem('MFL_DB'));
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const activeLink = document.getElementById('nav-' + page);
  if (activeLink) activeLink.classList.add('active');
  
  if (page === 'teams') renderTeams();
  if (page === 'stats') renderStats();
  if (page === 'admin') renderAdmin();
}

function toggleTheme() {
  document.documentElement.classList.toggle('light');
  const icon = document.getElementById('theme-icon');
  icon.className = document.documentElement.classList.contains('light') ? 'fas fa-sun' : 'fas fa-moon';
}

function renderTeams() {
  const container = document.getElementById('teams-content');
  container.innerHTML = '';
  LEAGUE_DATA.teams.forEach(t => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3>${t.name}</h3><p>${t.conf} Conference</p>`;
    container.appendChild(div);
  });
}

function renderStats() {
  const tbody = document.querySelector('#stats-table tbody');
  tbody.innerHTML = '';
  LEAGUE_DATA.stats.sort((a,b)=>b.fp-a.fp).forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${s.name}</td><td><strong>${s.fp}</strong></td>`;
    tbody.appendChild(tr);
  });
}

function renderAdmin() {
  document.getElementById('raw-json').value = JSON.stringify(LEAGUE_DATA, null, 2);
}

function checkAdminPw() {
  if (document.getElementById('admin-pw').value === "MFLSTAFF1234") {
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-dashboard').style.display = 'block';
    renderAdmin();
  } else {
    alert("Wrong password");
  }
}

function saveRaw() {
  try {
    LEAGUE_DATA = JSON.parse(document.getElementById('raw-json').value);
    localStorage.setItem('MFL_DB', JSON.stringify(LEAGUE_DATA));
    alert("Saved successfully!");
    renderTeams();
    renderStats();
  } catch(e) {
    alert("Invalid JSON format");
  }
}

// Initialize
renderTeams();
renderStats();
</script>
</body>
</html>
