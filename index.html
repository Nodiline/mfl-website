<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Football League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .pixel-font { font-family: 'Press Start 2P', monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- Navbar -->
    <nav class="border-b border-zinc-800 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-black font-black text-3xl pixel-font">M</div>
                <div>
                    <span class="text-3xl font-bold pixel-font tracking-tighter">MFL</span>
                </div>
            </div>
            <div class="flex gap-8 text-sm font-medium">
                <a href="index.html" class="text-emerald-400 font-semibold">HOME</a>
                <a href="#" onclick="showPage('teams')" class="hover:text-emerald-400">Teams</a>
                <a href="#" onclick="showPage('schedule')" class="hover:text-emerald-400">Schedule</a>
            </div>
            <button class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium">JOIN SERVER</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="relative h-screen flex items-center justify-center bg-gradient-to-br from-zinc-950 via-black to-zinc-950 overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,#22c55e10_0%,transparent_70%)]"></div>
        
        <div class="text-center z-10 px-6 max-w-4xl">
            <div class="inline-flex items-center gap-2 bg-zinc-900 border border-emerald-500/30 rounded-full px-4 py-1 text-sm mb-6">
                <span class="text-emerald-400">⚔️</span>
                SEASON 1
            </div>
            
            <h1 class="text-7xl md:text-8xl font-black pixel-font tracking-tighter leading-none mb-6">
                MINECRAFT<br>FOOTBALL<br>LEAGUE
            </h1>
            
            <p class="text-xl text-zinc-400 mb-10 max-w-lg mx-auto">
                Build. Battle. Dominate.<br>
                Welcome to the ultimate Minecraft football experience.
            </p>

            <div class="flex gap-4 justify-center">
                <button onclick="showPage('teams')" 
                        class="px-10 py-4 bg-white text-black font-bold rounded-2xl hover:bg-zinc-200 transition-all text-lg">
                    VIEW TEAMS
                </button>
                <button onclick="showPage('schedule')" 
                        class="px-10 py-4 border border-emerald-500 text-emerald-400 font-bold rounded-2xl hover:bg-emerald-500/10 transition-all text-lg">
                    FULL SCHEDULE
                </button>
            </div>
        </div>

        <div class="absolute bottom-10 text-center w-full">
            <div class="text-emerald-400 text-sm tracking-widest">SCROLL TO EXPLORE ↓</div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="max-w-7xl mx-auto px-6 py-20 grid md:grid-cols-3 gap-8">
        <div onclick="showPage('teams')" class="bg-zinc-900 border border-zinc-700 hover:border-emerald-500 rounded-3xl p-8 cursor-pointer transition-all">
            <h3 class="text-2xl font-bold mb-2">Teams</h3>
            <p class="text-zinc-400">View all teams and rosters</p>
        </div>
        <div onclick="showPage('schedule')" class="bg-zinc-900 border border-zinc-700 hover:border-emerald-500 rounded-3xl p-8 cursor-pointer transition-all">
            <h3 class="text-2xl font-bold mb-2">Schedule</h3>
            <p class="text-zinc-400">Full season match schedule</p>
        </div>
        <div class="bg-zinc-900 border border-zinc-700 hover:border-emerald-500 rounded-3xl p-8 cursor-pointer transition-all">
            <h3 class="text-2xl font-bold mb-2">Join the League</h3>
            <p class="text-zinc-400">How to join the server</p>
        </div>
    </div>

    <script>
        function showPage(page) {
            alert("This would open the " + page + " page in a full website.");
        }
    </script>
</body>
</html>
