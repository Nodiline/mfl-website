<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Football League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-home-opacity: 0.1;
            --bg:#0c0c0c; --surface:rgba(19,19,19,0.75); --surface2:rgba(26,26,26,0.85); --border:#252525;
            --text:#efefef; --muted:#a3a3a3; --accent:#4ade80; --accent-dim:#166534;
            --nav-bg:rgba(10,10,10,0.8);
        }
        html.light {
            --bg-home-opacity: 0.07;
            --bg:#f4f4f3; --surface:rgba(255,255,255,0.8); --surface2:rgba(234,234,232,0.9); --border:#d8d8d4;
            --text:#111; --muted:#555; --accent:#16a34a; --accent-dim:#bbf7d0;
            --nav-bg:rgba(244,244,243,0.8);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}
        nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
        .nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:82px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
        .nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
        .nav-brand .logo-wrap{width:40px;height:40px;}
        .nav-brand-name{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text);}
        .nav-links{display:flex;gap:2px;list-style:none;}
        .nav-links a{display:block;padding:12px 18px;color:var(--muted);text-decoration:none;font-size:18px;font-weight:500;border-radius:7px;transition:color .15s,background .15s;}
        .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface2);backdrop-filter:blur(4px);}
        .theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:color .15s,background .15s;flex-shrink:0;}
        .theme-btn:hover{color:var(--text);background:var(--border);}

        /* ── PAGE TRANSITIONS ── */
        .page {
            display: none;
            opacity: 0;
            transform: translateY(10px);
        }
        .page.active {
            display: block;
            animation: pageIn .38s cubic-bezier(.22,.61,.36,1) forwards;
        }
        .page.leaving {
            display: block;
            animation: pageOut .22s cubic-bezier(.4,0,1,1) forwards;
        }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pageOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-6px); }
        }
        @media (prefers-reduced-motion: reduce) {
            .page.active, .page.leaving { animation: none; opacity: 1; transform: none; }
        }

        /* ... (rest of your original styles remain unchanged) ... */

        .modal-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
