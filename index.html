<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Football League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .pixel-font { font-family: 'Press Start 2P', monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="https://cdn.discordapp.com/emojis/1245791095019929651.webp?size=96" alt="MFL" class="w-10 h-10">
                <div>
                    <span class="text-3xl font-bold pixel-font tracking-tighter">MFL</span>
                </div>
            </div>

            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="#" onclick="navigate('home')" class="hover:text-emerald-400">Home</a>
                <a href="#" onclick="navigate('teams')" class="hover:text-emerald-400">Teams</a>
                <a href="#" onclick="navigate('schedule')" class="hover:text-emerald-400">Schedule</a>
            </div>

            <button onclick="toggleTheme()" id="theme-toggle"
                    class="px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-xl flex items-center gap-2">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- HOME PAGE -->
    <div id="home" class="relative">
        <div class="max-w-7xl mx-auto px-6 py-20 flex flex-col md:flex-row items-center gap-12">
            <div class="flex-1">
                <div class="uppercase tracking-widest text-emerald-400 text-sm mb-3">MINECRAFT FOOTBALL LEAGUE</div>
                <h1 class="text-6xl md:text-7xl font-bold pixel-font leading-none mb-6">WELCOME TO THE LEAGUE</h1>
                <p class="text-xl text-zinc-400 max-w-lg">Season 1 is here. Build your team. Battle in the arena. Claim glory.</p>
            </div>
            <div class="flex-1 flex justify-center">
                <img src="https://cdn.discordapp.com/emojis/1245791095019929651.webp?size=256" alt="MFL Logo" class="w-64 opacity-90">
            </div>
        </div>
    </div>

    <!-- TEAMS PAGE -->
    <div id="teams" class="hidden max-w-7xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-bold pixel-font text-center mb-4">TEAMS</h1>
        <p class="text-center text-zinc-400 mb-12">Season 1 Rosters</p>
        <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- SCHEDULE PAGE -->
    <div id="schedule" class="hidden max-w-5xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-bold pixel-font text-center mb-12">SEASON 1 SCHEDULE</h1>
        <div id="schedule-content" class="space-y-12"></div>
    </div>

    <script>
        const teams = [
            { name: "Dolphins", logo: "https://cdn.discordapp.com/emojis/985605150548832337.webp?size=96", players: ["L8 Knight", "Bigham", "Flamefarter", "robby", "Deadrr", "conl", "ilyfade", "Peng"], color: "#0ea5e9" },
            { name: "Guardians", logo: "https://cdn.discordapp.com/emojis/991822157258698862.webp?size=96", players: ["TomNotTom", "Muddydt", "Slicky", "LDNH", "Randomhere"], color: "#14b8a6" },
            { name: "Polar Bears", logo: "https://cdn.discordapp.com/emojis/1058837067343335594.webp?size=96", players: ["Prodigy", "Lustin", "Sagil", "Creamv", "Forestguest"], color: "#64748b" },
            { name: "Rams", logo: "https://cdn.discordapp.com/emojis/985068684148109362.webp?size=96", players: ["Josh", "Trigg", "Ajclips", "Steve", "Djcrafter"], color: "#b45309" },
            { name: "Pigs", logo: "https://cdn.discordapp.com/emojis/985273710405632010.webp?size=96", players: ["Beefour", "Juadeep", "Chaseler", "Chief", "QC", "Coolpersin", "Fak"], color: "#f59e0b" },
            { name: "Foxes", logo: "https://cdn.discordapp.com/emojis/951695996004466728.webp?size=96", players: ["Foxanuka", "Land", "syrb", "Sagil", "Kdawgharden", "Penley"], color: "#ea580c" },
            { name: "Horsemen", logo: "https://cdn.discordapp.com/emojis/1442651969704558602.webp?size=96", players: ["Dhir", "Penguin", "Tracklol", "MJS", "Tezi"], color: "#854d0e" },
            { name: "Dragons", logo: "https://cdn.discordapp.com/emojis/942504840821633104.webp?size=96", players: ["Noodle", "Botz", "Visai", "Vizo", "Frtpear"], color: "#b91c1c" },
            { name: "Glowsquids", logo: "https://cdn.discordapp.com/emojis/1404571807939432468.webp?size=96", players: ["Exabyte", "Ayvvri", "Phosphane", "Buhg"], color: "#22d3ee" },
            { name: "Phantoms", logo: "https://cdn.discordapp.com/emojis/985319259565609020.webp?size=96", players: ["Henryvz", "Smoky", "Mcnugget", "Spej", "zolo"], color: "#6b7280" },
            { name: "Ghasts", logo: "https://cdn.discordapp.com/emojis/1062965414319116370.webp?size=96", players: ["Coozy", "Ironbug", "Cozy", "Avoids", "Sheerpluto", "Xany"], color: "#7c3aed" },
            { name: "Penguins", logo: "https://cdn.discordapp.com/emojis/1405341961732493383.webp?size=96", players: ["Techhector", "Lub", "Shinichi", "Yaxalk", "Tac10k", "Bleh"], color: "#1e40af" }
        ];

        const schedule = { /* same as before */ 
            1: ["Dolphins @ Guardians","Polar Bears @ Rams","Pigs @ Foxes","Horsemen @ Dragons","Glowsquids @ Phantoms","Ghasts @ Penguins"],
            2: ["Phantoms @ Foxes","Polar Bears @ Penguins","Rams @ Dragons","Glowsquids @ Pigs","Guardians @ Ghasts","Dolphins @ Horsemen"],
            3: ["Phantoms @ Guardians","Foxes @ Dragons","Pigs @ Ghasts","Glowsquids @ Dolphins","Penguins @ Rams","Horsemen @ Polar Bears"],
            4: ["Guardians @ Polar Bears","Ghasts @ Horsemen","Glowsquids @ Ghasts","Dragons @ Penguins","Rams @ Pigs","Foxes @ Dolphins"],
            5: ["Dolphins @ Polar Bears","Guardians @ Rams","Pigs @ Phantoms","Foxes @ Ghasts","Dragons @ Glowsquids","Rams @ Penguins"],
            6: ["Foxes @ Polar Bears","Dolphins @ Rams","Guardians @ Dragons","Dolphins @ Horsemen","Glowsquids @ Penguins","Ghasts @ Phantoms"],
            7: ["Horsemen @ Foxes","Penguins @ Dolphins","Pigs @ Guardians","Ghasts @ Dragons","Rams @ Phantoms","Polar Bears @ Glowsquids"]
        };

        function renderTeams() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = teams.map(team => `
                <div class="bg-zinc-900 border border-zinc-800 hover:border-emerald-500 rounded-3xl p-6 transition-all group">
                    <div class="flex items-center gap-4 mb-6">
                        <img src="${team.logo}" class="w-16 h-16 rounded-2xl" alt="${team.name}">
                        <div class="text-2xl font-bold">${team.name}</div>
                    </div>
                    <div class="text-xs uppercase text-emerald-400 mb-3">Roster (${team.players.length})</div>
                    <div class="grid grid-cols-2 gap-1 text-sm text-zinc-300">${team.players.map(p => `<div>${p}</div>`).join('')}</div>
                </div>
            `).join('');
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-content');
            container.innerHTML = Object.keys(schedule).map(week => `
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
                    <h2 class="text-2xl font-bold text-emerald-400 mb-6">WEEK ${week}</h2>
                    <div class="space-y-3">${schedule[week].map(m => `<div class="bg-zinc-950 border border-zinc-800 rounded-2xl px-6 py-4">${m}</div>`).join('')}</div>
                </div>
            `).join('');
        }

        function navigate(page) {
            document.querySelectorAll('#home, #teams, #schedule').forEach(el => el.classList.add('hidden'));
            document.getElementById(page).classList.remove('hidden');
        }

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                document.getElementById('theme-toggle').innerHTML = `<i class="fas fa-sun"></i>`;
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                document.getElementById('theme-toggle').innerHTML = `<i class="fas fa-moon"></i>`;
            }
        }

        window.onload = () => {
            renderTeams();
            renderSchedule();
            navigate('home');
        };
    </script>
</body>
</html>
